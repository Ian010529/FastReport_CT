groups:
  - name: fastreport-core-alerts
    rules:
      - alert: FastReportBackendDown
        expr: up{job="fastreport-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "FastReport backend is down"
          description: "Prometheus cannot scrape the Spring Boot backend metrics endpoint."

      - alert: FastReportApiP95High
        expr: histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{uri="/api/reports",method="POST"}[5m]))) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "POST /api/reports latency is high"
          description: "The 95th percentile latency for POST /api/reports has been above 1 second for 10 minutes."

      - alert: FastReportApi5xxRateHigh
        expr: 100 * sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) / clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 0.001) > 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx rate is high"
          description: "More than 2% of backend HTTP requests are returning 5xx responses."

      - alert: FastReportQueueBacklogHigh
        expr: fastreport_rabbitmq_main_queue_depth + fastreport_rabbitmq_retry_queue_depth > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ backlog is growing"
          description: "The combined main and retry queue depth has been above 100 messages for 10 minutes."

      - alert: FastReportCompletionRateLow
        expr: (sum(increase(fastreport_report_terminal_total{status="completed"}[15m])) / clamp_min(sum(increase(fastreport_reports_created_total[15m])), 1)) < 0.9 and sum(increase(fastreport_reports_created_total[15m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Report completion rate is low"
          description: "Completed reports in the last 15 minutes fell below 90% of created reports."

      - alert: FastReportFailureRateHigh
        expr: 100 * sum(increase(fastreport_report_terminal_total{status="failed"}[15m])) / clamp_min(sum(increase(fastreport_reports_created_total[15m])), 1) > 5
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Report failure rate is high"
          description: "More than 5% of created reports failed over the last 15 minutes."

      - alert: FastReportRetryRatioHigh
        expr: 100 * sum(increase(fastreport_report_retries_total[15m])) / clamp_min(sum(increase(fastreport_reports_created_total[15m])), 1) > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Report retry ratio is high"
          description: "More than 10% retries were scheduled compared with created reports in the last 15 minutes."

      - alert: FastReportLlmErrorRateHigh
        expr: 100 * sum(rate(fastreport_llm_requests_total{outcome="error"}[10m])) / clamp_min(sum(rate(fastreport_llm_requests_total[10m])), 0.001) > 10
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "LLM error rate is high"
          description: "More than 10% of LLM calls are failing over the last 10 minutes."

      - alert: FastReportEndToEndLatencyHigh
        expr: histogram_quantile(0.95, sum by (le) (rate(fastreport_report_end_to_end_duration_seconds_bucket{status="completed"}[5m]))) > 120
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "End-to-end generation latency is high"
          description: "The 95th percentile report generation duration has been above 120 seconds for 10 minutes."

      - alert: FastReportJvmHeapUsageHigh
        expr: 100 * sum(jvm_memory_used_bytes{area="heap"}) / clamp_min(sum(jvm_memory_max_bytes{area="heap"}), 1) > 85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap usage is high"
          description: "Heap usage has remained above 85% for 15 minutes."

      - alert: FastReportDbPoolUsageHigh
        expr: 100 * sum(hikaricp_connections_active) / clamp_min(sum(hikaricp_connections_max), 1) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool usage is high"
          description: "HikariCP active connections have been above 80% of the configured pool size for 10 minutes."
