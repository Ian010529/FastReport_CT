server:
  port: 8080

spring:
  profiles:
    default: local
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fastreport}
    username: ${SPRING_DATASOURCE_USERNAME:fastreport}
    password: ${SPRING_DATASOURCE_PASSWORD:fastreport123}
    driver-class-name: org.postgresql.Driver
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
  jackson:
    default-property-inclusion: non_null

fastreport:
  cors:
    allowed-origins: ${FASTREPORT_ALLOWED_ORIGINS:http://localhost:3000}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com}
  model: ${OPENAI_MODEL:gpt-4o-mini}

llm:
  provider: ${LLM_PROVIDER:openai-compatible}
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    model: ${OPENAI_MODEL:gpt-4o-mini}
  claude:
    api-key: ${CLAUDE_API_KEY:}
    base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com}
    model: ${CLAUDE_MODEL:claude-3-5-sonnet-latest}
    api-version: ${CLAUDE_API_VERSION:2023-06-01}

logging:
  level:
    com.ct.fastreport: DEBUG
