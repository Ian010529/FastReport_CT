server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fastreport}
    username: ${SPRING_DATASOURCE_USERNAME:fastreport}
    password: ${SPRING_DATASOURCE_PASSWORD:fastreport123}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
  jackson:
    default-property-inclusion: non_null

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com}
  model: ${OPENAI_MODEL:gpt-4o-mini}

logging:
  level:
    com.ct.fastreport: DEBUG
